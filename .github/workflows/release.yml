name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  verify-version:
    name: Verify tag matches package versions
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Assert versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for f in package.json cli/package.json vscode-extension/package.json backend/package.json frontend/package.json; do
            PKG_VERSION=$(node -p "require('./$f').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$f version $PKG_VERSION != tag $TAG_VERSION"
              exit 1
            fi
          done
          echo "All package.json versions match tag v$TAG_VERSION"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  release-assets:
    name: Attach release artifacts
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            cli/package-lock.json
            vscode-extension/package-lock.json

      - name: Build CLI tarball
        run: |
          cd cli && npm ci && npm run build && npm pack

      - name: Build VSIX
        run: |
          cd vscode-extension && npm install && npm run compile && npx vsce package -o mock-api-studio.vsix

      - name: Upload artifacts to release
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            cli/*.tgz \
            vscode-extension/mock-api-studio.vsix \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: release
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      secrets.NPM_TOKEN != ''
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Sync CLI version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: cli

      - run: npm ci && npm run build
        working-directory: cli

      - name: Publish with provenance
        run: npm publish --access public --provenance
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-release:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: release
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      secrets.DOCKER_USERNAME != '' &&
      secrets.DOCKER_PASSWORD != ''
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mock-api-studio-backend:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/mock-api-studio-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mock-api-studio-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/mock-api-studio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-vscode-extension:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    needs: release
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      secrets.VSCE_PAT != ''
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Sync extension version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: vscode-extension

      - run: npm install && npm run compile
        working-directory: vscode-extension

      - name: Publish to Marketplace
        run: npx vsce publish -p "$VSCE_PAT"
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
